<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ER Nursing Audit (ADPIE) v4+</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
:root {
  --bd-dark: #0d47a1;
  --bd-light: #e3f2fd;
  --yw-dark: #f57f17;
  --yw-light: #fffde7;
  --pass-bg: #e8f5e9;
  --fail-bg: #ffebee;
  --body-bg: #f8fafc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Sarabun, sans-serif; background: var(--body-bg); color: #1a237e; font-size: 11px; }
#app { max-width: 1200px; margin: 0 auto; padding: 8px; }
.tabs { display: flex; gap: 4px; margin-bottom: 6px; justify-content: center; flex-wrap: wrap; }
.tabs button { padding: 6px 14px; border: none; border-radius: 6px 6px 0 0; font-size: 11px; font-weight: 700; cursor: pointer; background: #e3f2fd; color: #0d47a1; font-family: inherit; }
.tabs button.on { background: linear-gradient(135deg, var(--bd-dark), var(--yw-dark)); color: #fff; }
.hdr { background: linear-gradient(135deg, #f3f7ff 0%, #fffde7 100%); border: 1.5px solid #fbc02d; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
.hdr-title { text-align: center; border-bottom: 2px solid var(--yw-dark); padding-bottom: 4px; margin-bottom: 6px; }
.hdr-title h2 { font-size: 13px; font-weight: 800; color: var(--yw-dark); }
.badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 9px; font-weight: 800; background: #f3f7ff; color: #0d47a1; border: 1px solid #1976d2; margin-left: 8px; }
.r { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
.r label { font-weight: 700; font-size: 10px; color: #0d47a1; white-space: nowrap; }
.r input, .r select { padding: 2px 5px; border: 1px solid #1976d2; border-radius: 3px; font-size: 10px; font-family: inherit; background: #f3f7ff; }
.r input[type="date"] { width: 110px; }
.cd { background: #fff; border: 1px solid #e3f2fd; border-radius: 6px; padding: 6px 8px; margin-bottom: 5px; }
.adpie-section { background: linear-gradient(135deg, #f3f7ff, #fffde7); border: 1px solid #1976d2; border-radius: 8px; padding: 8px; margin-bottom: 6px; }
.section-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-weight: 800; font-size: 11px; color: var(--bd-dark); cursor: pointer; user-select: none; }
.section-head::before { content: "▶"; display: inline-block; width: 12px; transition: transform 0.2s; }
.section-head.open::before { transform: rotate(90deg); }
.section-content { display: none; padding-left: 36px; }
.section-content.show { display: block; }
.audit-item { display: flex; gap: 8px; align-items: flex-start; padding: 5px; margin-bottom: 4px; background: #fafbff; border: 1px solid #e8eef5; border-radius: 4px; }
.audit-item-label { flex: 1; font-weight: 600; color: #0d47a1; line-height: 1.3; }
.audit-buttons { display: flex; gap: 2px; }
.score-btn { padding: 2px 6px; border: 1px solid #1976d2; background: #e3f2fd; border-radius: 3px; cursor: pointer; font-size: 9px; font-weight: 700; min-width: 28px; text-align: center; }
.score-btn.active { color: #fff; font-weight: 800; }
.score-btn.p1 { background: #a5d6a7 !important; color: #1b5e20 !important; border-color: #81c784 !important; }
.score-btn.p0 { background: #ef5350 !important; color: #fff !important; border-color: #e53935 !important; }
.score-btn.pN { background: #fdd835 !important; color: #000 !important; border-color: #f9a825 !important; font-weight: 800 !important; }
.score-summary { background: linear-gradient(135deg, var(--bd-light), var(--yw-light)); border: 1px solid #1976d2; border-radius: 6px; padding: 8px 10px; margin-bottom: 5px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.score-summary > div { font-size: 10px; color: #0d47a1; }
.score-summary b { font-size: 14px; font-weight: 800; }
.btn { padding: 5px 12px; border: none; border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-p { background: var(--bd-dark); color: #fff; }
.btn-s { background: #388e3c; color: #fff; }
.btn-o { background: #fff; border: 1.5px solid #1976d2; color: #0d47a1; }
.btn-pull { background: linear-gradient(135deg, #4db8ff, #0066cc); color: #fff; border: none; }
.msg { padding: 5px 8px; text-align: center; border-radius: 5px; font-weight: 700; margin-bottom: 4px; font-size: 11px; background: #e3f2fd; color: #0d47a1; border: 1px solid #1976d2; }
.kpi-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.kpi { flex: 1; min-width: 100px; background: linear-gradient(135deg, #f3f7ff, #fffde7); border: 1px solid #1976d2; border-radius: 8px; padding: 8px; text-align: center; }
.kpi .kl { font-size: 8.5px; color: #3f51b5; margin-bottom: 2px; }
.kpi .kv { font-weight: 800; font-size: 16px; color: var(--bd-dark); }
table.tbl { border-collapse: collapse; width: 100%; font-size: 10px; margin: 4px 0; }
table.tbl th { background: var(--bd-dark); color: #fff; padding: 3px; border: 1px solid #0d47a1; font-size: 9px; font-weight: 700; }
table.tbl td { border: 1px solid #e8eef5; padding: 2px 3px; text-align: center; }
table.tbl tr.pass td { background: #e8f5e9; }
table.tbl tr.fail td { background: #ffebee; }
.status-pass { display: inline-block; padding: 2px 8px; border-radius: 10px; background: var(--pass-bg); color: #1b5e20; font-weight: 700; font-size: 9px; border: 1px solid #a5d6a7; }
.status-fail { display: inline-block; padding: 2px 8px; border-radius: 10px; background: #ffcdd2; color: #b71c1c; font-weight: 700; font-size: 9px; border: 1px solid #ef5350; }
.chart-container { position: relative; height: 250px; margin: 8px 0; padding: 8px; background: #fafbff; border: 1px solid #e3f2fd; border-radius: 6px; page-break-before: always; }
.rpt-title { text-align: center; font-weight: 800; font-size: 12px; color: var(--bd-dark); border-bottom: 2px solid var(--yw-dark); padding-bottom: 3px; margin-bottom: 5px; }
.weak-item { background: #ffebee; border: 1px solid #ef5350; border-left: 4px solid #d32f2f; border-radius: 4px; padding: 6px; margin-bottom: 6px; }
.weak-item-title { font-weight: 700; color: #b71c1c; font-size: 10px; margin-bottom: 2px; }
.weak-item-desc { font-size: 9px; color: #666; }
.color-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin: 8px 0; }
.color-box { border: 1px solid #ddd; border-radius: 6px; padding: 8px; background: #fff; }
.color-box label { display: block; font-weight: 700; font-size: 9px; color: #0d47a1; margin-bottom: 4px; }
.color-box input[type="color"] { width: 100%; height: 32px; cursor: pointer; border: none; border-radius: 3px; }
@media print {
  .tabs, .btn, .msg { display: none !important; }
  body { margin: 0; padding: 0; font-size: 10px; }
  #app { max-width: 100%; margin: 0; padding: 0; }
  .cd { page-break-inside: avoid; break-inside: avoid; margin-bottom: 12px; padding: 8px; }
  table.tbl { page-break-inside: avoid; break-inside: avoid; margin: 8px 0; }
  .chart-container { page-break-inside: avoid; break-inside: avoid; height: 220px; margin: 10px 0; }
  .hdr { page-break-after: avoid; break-after: avoid; margin-bottom: 8px; }
  .kpi-row { page-break-inside: avoid; break-inside: avoid; }
  .weak-item { page-break-inside: avoid; break-inside: avoid; }
  @page { margin: 12mm 12mm 12mm 12mm; size: A4; }
}
  </style>
</head>
<body>
<div id="app"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby2wZL9oln1fnrO1XO0x5qVh2yuQyd5n0D3gUiRJ2L8BSekxw0vazDChHMEoISRVR1e/exec";

const ADPIE_ITEMS = [
  { section: "A", label: "ประเมิน (Assessment)", icon: "📋", items: [
      { id: "A1", label: "บันทึกอาการสำคัญ (CC) ประวัติการบาดเจ็บ/เจ็บป่วย และระยะเวลาชัดเจน" },
      { id: "A2", label: "บันทึกสัญญาณชีพแรกรับครบถ้วน (BT, PR, RR, BP, O₂ Sat)" },
      { id: "A3", label: "ลงบันทึกการคัดแยกระดับความรุนแรง (Triage Level) ถูกต้อง" },
      { id: "A4", label: "บันทึกคะแนนความเจ็บปวด (Pain Score) ในเคสที่มีอาการปวด" }
    ]
  },
  { section: "D", label: "วินิจฉัย (Diagnosis)", icon: "🔍", items: [
      { id: "D1", label: "ข้อวินิจฉัยพยาบาล สอดคล้องกับปัญหาหลักและอาการสำคัญ (CC)" },
      { id: "D2", label: "บันทึกข้อวินิจฉัยครอบคลุมภาวะเสี่ยงวิกฤต/ความปลอดภัย" },
      { id: "D3", label: "เขียนถูกต้องตามหลักวิชาชีพพยาบาล (ไม่เขียนสับสนกับชื่อโรค)" }
    ]
  },
  { section: "P", label: "วางแผน (Planning)", icon: "📌", items: [
      { id: "P1", label: "ระบุเป้าหมายการพยาบาล/ผลลัพธ์ที่คาดหวังชัดเจนและวัดผลได้" },
      { id: "P2", label: "กำหนดกิจกรรมการพยาบาล สอดคล้องกับข้อวินิจฉัยพยาบาล" },
      { id: "P3", label: "มีแผนการส่งต่อ/ย้ายตึก ที่ปลอดภัยและเตรียมอุปกรณ์ครบ" }
    ]
  },
  { section: "I", label: "ปฏิบัติการ (Implementation)", icon: "🏥", items: [
      { id: "I1", label: "บันทึกกิจกรรมการพยาบาลครบถ้วนตามคำสั่งแพทย์ (ยา, สารน้ำ, หัตถการ)" },
      { id: "I2", label: "บันทึกหัตถการมีการระบุ 'เวลา' ชัดเจน และลงนามผู้ปฏิบัติงาน" },
      { id: "I3", label: "บันทึกมาตรการความปลอดภัย (Double Check ยา, HAD, prevention)" }
    ]
  },
  { section: "E", label: "ประเมินผล (Evaluation)", icon: "✓", items: [
      { id: "E1", label: "บันทึกการประเมินอาการซ้ำหลังให้กิจกรรม/ยา (Re-Pain score, Re-sugar)" },
      { id: "E2", label: "บันทึกสัญญาณชีพครั้งสุดท้ายก่อนจำหน่าย (Discharge Vital Signs)" },
      { id: "E3", label: "บันทึกเวลา/สถานะการจำหน่าย และคำแนะนำก่อนกลับบ้าน" }
    ]
  }
];

const DEFAULT_COLORS = {
  A_pass: "#4CAF50", A_fail: "#FF6B6B",
  D_pass: "#2196F3", D_fail: "#FF9800",
  P_pass: "#9C27B0", P_fail: "#FFC107",
  I_pass: "#00BCD4", I_fail: "#E91E63",
  E_pass: "#FF5722", E_fail: "#795548"
};

const toBE = iso => {
  if (!iso || iso.length < 10) return "";
  const p = iso.split("-");
  return p[2] + "/" + p[1] + "/" + (+p[0] + 543);
};

const TODAY = new Date().toISOString().slice(0, 10);

function loadLS() {
  return JSON.parse(localStorage.getItem("erna_v5") || "[]");
}

function loadColors() {
  return JSON.parse(localStorage.getItem("erna_colors") || JSON.stringify(DEFAULT_COLORS));
}

let COLORS = loadColors();

let S = {
  tab: "form",
  records: loadLS(),
  i: { hcode: "11156", hn: "", hname: "", triageLevel: "Level 3", nurseName: "", visitDate: TODAY },
  scores: {},
  editId: null,
  msg: "",
  rptFrom: "",
  rptTo: ""
};

function calcScore(sc) {
  let sum = 0, full = 0;
  ADPIE_ITEMS.forEach(sec => {
    sec.items.forEach(item => {
      const v = sc[item.id];
      if (v !== "N") {
        sum += (v === 1 ? 1 : 0);
        full++;
      }
    });
  });
  return { sum, full, pct: full ? Math.round(sum / full * 10000) / 100 : 0 };
}

const sv = () => {
  console.log("💾 Saving to localStorage...", S.records.length, "records");
  localStorage.setItem("erna_v5", JSON.stringify(S.records));
  console.log("✅ Saved!");
};

const svColors = () => {
  localStorage.setItem("erna_colors", JSON.stringify(COLORS));
};

function h(t, a, ...ch) {
  const e = document.createElement(t);
  if (a) {
    Object.entries(a).forEach(([k, v]) => {
      if (k === "style" && typeof v === "object") Object.assign(e.style, v);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "className") e.className = v;
      else if (k === "value" && t !== "option") e.value = v;
      else if (k === "checked") e.checked = v;
      else e.setAttribute(k, v);
    });
  }
  ch.flat(9).forEach(c => {
    if (c != null && c !== false) {
      e.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(String(c)) : c);
    }
  });
  return e;
}

function toggleSection(id) {
  const el = document.getElementById("section-" + id);
  if (el) {
    el.classList.toggle("open");
    const content = document.getElementById("content-" + id);
    if (content) content.classList.toggle("show");
  }
}

async function downloadFromCloud() {
  S.msg = "⬇️ ดึงข้อมูล...";
  ren();
  try {
    const r = await fetch(GAS_URL);
    const json = await r.json();
    if (json.ok && json.records && json.records.length > 0) {
      S.records = json.records;
      sv();
      S.msg = "✅ Pull " + json.records.length + " ราย";
    } else {
      S.msg = "⚠️ ไม่มีข้อมูล";
    }
  } catch (e) {
    S.msg = "⚠️ ดึงไม่ได้";
  }
  ren();
  setTimeout(() => { S.msg = ""; ren(); }, 2000);
}

async function syncToCloud() {
  if (!S.records.length) { S.msg = "⚠️ ไม่มีข้อมูล"; ren(); return; }
  S.msg = "☁️ ส่งข้อมูล...";
  ren();
  try {
    const formData = new FormData();
    formData.append("data", JSON.stringify(S.records));
    const r = await fetch(GAS_URL, { method: "POST", body: formData });
    S.msg = r.ok ? "✅ Push สำเร็จ" : "⚠️ Error";
  } catch (e) {
    S.msg = "⚠️ ส่งไม่ได้";
  }
  ren();
  setTimeout(() => { S.msg = ""; ren(); }, 2000);
}

function ren() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const tot = calcScore(S.scores);
  
  app.appendChild(h("div", { className: "tabs" },
    h("button", { className: S.tab === "form" ? "on" : "", onClick: () => { S.tab = "form"; ren(); } }, "✍️ บันทึก"),
    h("button", { className: S.tab === "report" ? "on" : "", onClick: () => { S.tab = "report"; ren(); } }, "📊 รายงาน"),
    h("button", { className: S.tab === "settings" ? "on" : "", onClick: () => { S.tab = "settings"; ren(); } }, "🎨 สี"),
    h("button", { className: "btn btn-pull", style: { padding: "4px 10px", fontSize: "9px" }, onClick: downloadFromCloud }, "⬇️ Pull"),
    h("button", { className: "btn btn-o", style: { padding: "4px 10px", fontSize: "9px" }, onClick: syncToCloud }, "☁️ Push")
  ));

  if (S.msg) app.appendChild(h("div", { className: "msg" }, S.msg));

  if (S.tab === "form") rF(app, tot);
  else if (S.tab === "report") rR(app);
  else if (S.tab === "settings") rS(app);
}

function rF(app, tot) {
  app.appendChild(h("div", { className: "hdr" },
    h("div", { className: "hdr-title" },
      h("h2", null, "ตรวจประเมินปฏิบัติการพยาบาลตาม ADPIE"),
      h("span", { className: "badge" }, "พยาบาล ER | 16 ข้อ")
    ),
    h("div", { className: "r" }, h("label", null, "HN:"), h("input", { type: "text", value: S.i.hn, onChange: e => S.i.hn = e.target.value })),
    h("div", { className: "r" }, h("label", null, "ชื่อ-สกุล:"), h("input", { type: "text", value: S.i.hname, onChange: e => S.i.hname = e.target.value })),
    h("div", { className: "r" }, h("label", null, "Triage:"), h("select", { value: S.i.triageLevel, onChange: e => S.i.triageLevel = e.target.value }, h("option", null, "Level 1"), h("option", null, "Level 2"), h("option", null, "Level 3"), h("option", null, "Level 4-5"))),
    h("div", { className: "r" }, h("label", null, "พยาบาล:"), h("input", { type: "text", value: S.i.nurseName, onChange: e => S.i.nurseName = e.target.value })),
    h("div", { className: "r" }, h("label", null, "วันที่:"), h("input", { type: "date", value: S.i.visitDate, onChange: e => S.i.visitDate = e.target.value }))
  ));

  app.appendChild(h("div", { className: "score-summary" },
    h("div", null, "Full: ", h("b", null, tot.full)),
    h("div", null, "Sum: ", h("b", null, tot.sum)),
    h("div", null, "% ", h("b", { style: { color: tot.pct >= 90 ? "#4CAF50" : "#FF6B6B" } }, tot.pct))
  ));

  ADPIE_ITEMS.forEach(sec => {
    const secDiv = h("div", { className: "adpie-section" });
    const secHead = h("div", { className: "section-head open", id: "section-" + sec.section, onClick: () => toggleSection(sec.section) });
    secHead.appendChild(h("span", null, sec.icon + " " + sec.label + " (" + sec.items.length + ")"));
    secDiv.appendChild(secHead);
    const secContent = h("div", { className: "section-content show", id: "content-" + sec.section });
    sec.items.forEach(item => {
      const itemDiv = h("div", { className: "audit-item" });
      itemDiv.appendChild(h("div", { className: "audit-item-label" }, item.label));
      const btnGroup = h("div", { className: "audit-buttons" });
      const v = S.scores[item.id];
      [1, 0, "N"].forEach(val => {
        const btn = h("button", { className: "score-btn" + (v === val ? " p" + val + " active" : "") }, val === 1 ? "✓" : val === 0 ? "✗" : "N/A");
        btn.addEventListener("click", () => { S.scores[item.id] = val; ren(); });
        btnGroup.appendChild(btn);
      });
      itemDiv.appendChild(btnGroup);
      secContent.appendChild(itemDiv);
    });
    secDiv.appendChild(secContent);
    app.appendChild(secDiv);
  });

  app.appendChild(h("div", { style: { display: "flex", gap: "4px", justifyContent: "center", margin: "6px 0" } },
    h("button", { className: "btn btn-p", onClick: () => {
      if (!S.i.hn) { S.msg = "⚠️ ใส่ HN"; ren(); return; }
      const t = calcScore(S.scores);
      const rec = { id: S.editId || Date.now(), ...S.i, scores: {...S.scores}, sum: t.sum, full: t.full, pct: t.pct };
      if (S.editId) {
        S.records = S.records.map(r => r.id === S.editId ? rec : r);
        S.editId = null;
      } else {
        S.records.unshift(rec);
      }
      sv();
      S.msg = "✅ บันทึก";
      S.i = { hcode: "11156", hn: "", hname: "", triageLevel: "Level 3", nurseName: "", visitDate: TODAY };
      S.scores = {};
      ren();
    } }, "💾 บันทึก"),
    h("button", { className: "btn btn-s", onClick: () => { S.tab = "report"; ren(); } }, "📊 รายงาน")
  ));
}

function rR(app) {
  app.appendChild(h("div", { className: "cd" },
    h("div", { style: { fontWeight: "800", fontSize: "11px", color: "var(--bd-dark)", marginBottom: "4px" } }, "📅 กรองข้อมูล"),
    h("div", { className: "r" },
      h("label", null, "ตั้งแต่:"),
      h("input", { type: "date", value: S.rptFrom, onChange: e => { S.rptFrom = e.target.value; ren(); } }),
      h("label", null, "ถึง:"),
      h("input", { type: "date", value: S.rptTo, onChange: e => { S.rptTo = e.target.value; ren(); } }),
      h("button", { className: "btn btn-o", style: { padding: "2px 8px", fontSize: "10px" }, onClick: () => { S.rptFrom = ""; S.rptTo = ""; ren(); } }, "ล้าง")
    )
  ));

  let recs = S.records;
  if (S.rptFrom || S.rptTo) {
    recs = recs.filter(r => {
      const d = r.visitDate || "";
      if (S.rptFrom && d < S.rptFrom) return false;
      if (S.rptTo && d > S.rptTo) return false;
      return true;
    });
  }

  if (!recs.length) {
    app.appendChild(h("div", { style: { textAlign: "center", padding: "20px", color: "#aaa" } }, "ไม่มีข้อมูล"));
    return;
  }

  console.log("===== DEBUG =====");
  console.log("Total records:", recs.length);
  console.log("Sample record:", recs[0]);
  recs.forEach((r, i) => console.log(`Record ${i+1}: HN=${r.hn}, pct=${r.pct}, pass=${r.pct >= 90 ? "✓" : "✗"}`));

  const totalSum = recs.reduce((a, r) => a + (r.sum || 0), 0);
  const totalFull = recs.reduce((a, r) => a + (r.full || 0), 0);
  const avgPct = recs.length ? (recs.reduce((a, r) => a + (r.pct || 0), 0) / recs.length).toFixed(1) : 0;
  console.log("Checking passN:", recs.map(r => ({ hn: r.hn, pct: r.pct, pass: (r.pct || 0) >= 90 })));
  const passN = recs.filter(r => {
    const p = parseFloat(r.pct) || 0;
    return p >= 90;
  }).length;
  const failN = recs.length - passN;

  app.appendChild(h("div", { className: "cd" },
    h("div", { className: "rpt-title" }, "📊 สรุปผลการตรวจประเมิน"),
    h("div", { className: "kpi-row" },
      h("div", { className: "kpi" }, h("div", { className: "kl" }, "รวม"), h("div", { className: "kv" }, recs.length + " ราย")),
      h("div", { className: "kpi" }, h("div", { className: "kl" }, "Full"), h("div", { className: "kv" }, totalFull)),
      h("div", { className: "kpi" }, h("div", { className: "kl" }, "Sum"), h("div", { className: "kv" }, totalSum)),
      h("div", { className: "kpi" }, h("div", { className: "kl" }, "% เฉลี่ย"), h("div", { className: "kv", style: { color: +avgPct >= 90 ? "#16a34a" : "#d32f2f" } }, avgPct + "%")),
      h("div", { className: "kpi" }, h("div", { className: "kl" }, "✅ ผ่าน"), h("div", { className: "kv", style: { color: "#16a34a" } }, passN + " ราย")),
      h("div", { className: "kpi" }, h("div", { className: "kl" }, "❌ ต้องปรับ"), h("div", { className: "kv", style: { color: failN > 0 ? "#d32f2f" : "#90a4ae" } }, failN + " ราย"))
    )
  ));

  const secData = [];
  ADPIE_ITEMS.forEach(sec => {
    let sum = 0, full = 0;
    sec.items.forEach(item => {
      recs.forEach(rec => {
        const v = rec.scores[item.id];
        if (v !== "N") {
          sum += (v === 1 ? 1 : 0);
          full++;
        }
      });
    });
    secData.push({ section: sec.section, sum, full, pct: full ? Math.round(sum / full * 10000) / 100 : 0 });
  });

  app.appendChild(h("div", { className: "cd" },
    h("div", { style: { fontWeight: "800", fontSize: "11px", color: "var(--bd-dark)", marginBottom: "5px" } }, "📈 คะแนนรายหมวด ADPIE"),
    h("div", { className: "chart-container" }, h("canvas", { id: "chartSec" })),
    h("table", { className: "tbl" },
      h("tr", null, h("th", null, "Section"), h("th", null, "Full"), h("th", null, "Sum"), h("th", null, "%"), h("th", null, "Status")),
      secData.map(d => h("tr", { className: d.pct >= 90 ? "pass" : "fail" },
        h("td", null, h("b", null, d.section)),
        h("td", null, d.full),
        h("td", null, d.sum),
        h("td", null, h("b", null, d.pct + "%")),
        h("td", null, h("span", { className: d.pct >= 90 ? "status-pass" : "status-fail" }, d.pct >= 90 ? "✅ ผ่าน" : "❌ ต้องปรับ"))
      ))
    )
  ));

  const weakItems = [];
  ADPIE_ITEMS.forEach(sec => {
    sec.items.forEach(item => {
      let sum = 0, full = 0;
      recs.forEach(rec => {
        const v = rec.scores[item.id];
        if (v !== "N") {
          sum += (v === 1 ? 1 : 0);
          full++;
        }
      });
      if (full > 0 && sum / full < 0.9) {
        weakItems.push({ id: item.id, label: item.label, pct: Math.round(sum / full * 10000) / 100, sum, full });
      }
    });
  });

  weakItems.sort((a, b) => a.pct - b.pct);

  if (weakItems.length > 0) {
    app.appendChild(h("div", { className: "cd" },
      h("div", { style: { fontWeight: "800", fontSize: "12px", color: "#d32f2f", marginBottom: "5px" } }, "🔍 ส่วนที่ต้องปรับปรุง"),
      weakItems.map((w, i) => h("div", { className: "weak-item" },
        h("div", { className: "weak-item-title" }, (i + 1) + ". " + w.id + " (" + w.pct + "%) — " + w.sum + "/" + w.full + " ผ่าน"),
        h("div", { className: "weak-item-desc" }, w.label)
      ))
    ));
  }

  // วิเคราะห์ละเอียด: สาเหตุ + ปัญหา + วิธีแก้ (Actionable)
  const itemAnalysis = {
    "A1": { 
      cause: "ประวัติการเจ็บป่วย/อาการสำคัญบันทึกไม่ละเอียด", 
      problem: "ไม่มี template หรือ checklist ประวัติการรับผู้ป่วยที่ชัดเจน",
      solution: ["ระบบ: ขอ IT เพิ่ม mandatory fields ประวัติ (onset, duration, severity)", "ขั้นตอน: สร้าง Checklist CC+History ติดเตียง ER", "Training: สอนขั้นตอนการสัมภาษณ์ผู้ป่วยอย่างมีระบบ"]
    },
    "A2": { 
      cause: "สัญญาณชีพไม่ครบ (BT, PR, RR, BP, O₂ Sat)",
      problem: "ช่อง V/S ไม่ชัดเจน หรือมีข้อมูลหายไป",
      solution: ["ระบบ: ทำให้ V/S เป็น mandatory 6 ตัว ก่อน Save", "ขั้นตอน: วัด V/S ทั้ง 6 ตัว ก่อนบันทึก", "Equipment: ตรวจสอบ Pulse Oximeter, Thermometer ให้พร้อมใช้"]
    },
    "A3": { 
      cause: "การคัดแยก Triage Level ผิด หรือไม่ตรงกับอาการ",
      problem: "ไม่มี guideline Triage ตัวอักษร ให้พยาบาลใช้อ้างอิง",
      solution: ["ระบบ: เพิ่ม Alert 'ตรวจสอบ Triage Level ตามอาการ' ใน EMR", "Training: สอน Triage ตามมาตรฐาน (ER Thai Triage Scale หรือ PEWS)", "Poster: ติดตาราง Triage ที่เตียง ER"]
    },
    "A4": { 
      cause: "บันทึก Pain Score ไม่ครบทุกเคส",
      problem: "ช่อง PS ไกลจากช่อง V/S + ไม่ mandatory + ไม่มี alert",
      solution: ["ระบบ: ย้าย PS ให้ติดกับ V/S + ทำ mandatory (CC='ปวด')", "ระบบ: เพิ่ม Alert 'บันทึก PS ก่อน Save' เมื่อเคส pain", "Checklist: V/S → PS → Triage → บันทึก (เรียงลำดับชัดเจน)"]
    },
    "D1": { 
      cause: "วินิจฉัยพยาบาล ไม่ตรงกับ CC หรือปัญหาหลัก",
      problem: "ไม่มี template วินิจฉัย หรือ guideline เขียนวินิจฉัยที่ถูกต้อง",
      solution: ["Training: สอน NANDA diagnosis format (PES: Problem-Etiology-Sign)", "Template: จัดทำ list 20 diagnoses ที่ใช้บ่อย ER เพื่ออ้างอิง", "Tool: สร้าง quick reference ในระบบ"]
    },
    "D2": { 
      cause: "ไม่ครอบคลุมภาวะเสี่ยง (risk diagnosis)",
      problem: "พยาบาลลืมเขียน risk diagnoses เช่น infection risk, fall risk",
      solution: ["Template: สร้าง Checklist risk diagnosis (HAD risk, Fall risk, Infection risk)", "Training: ให้ความรู้เรื่อง risk assessment ในผู้ป่วยฉุกเฉิน", "Poster: ติดรายการ risk diagnosis ที่ ER"]
    },
    "D3": { 
      cause: "เขียนชื่อโรค (medical diagnosis) แทนวินิจฉัยพยาบาล",
      problem: "ไม่เข้าใจความแตกต่าง Nursing diagnosis vs Medical diagnosis",
      solution: ["Training: วิดีโอ/สไลด์สอน ความแตกต่าง Nursing vs Medical diagnosis", "Example: ให้ตัวอย่าง 10 เคส และเขียนวินิจฉัยพยาบาล", "Supervisor: review วินิจฉัยทีละคนก่อน approve"]
    },
    "P1": { 
      cause: "Goal/ผลลัพธ์คาดหวัง ไม่ชัดเจนหรือวัดผลไม่ได้",
      problem: "ไม่มี SMART goal framework",
      solution: ["Template: 'Goal: ผู้ป่วยจะบรรเทาปวดให้ ≤3/10 ภายใน 2 ชั่วโมง'", "Training: สอน SMART goal writing (Specific, Measurable, Achievable, Relevant, Time-bound)", "Checklist: goal template ใน EMR"]
    },
    "P2": { 
      cause: "Intervention/กิจกรรม ไม่ตรงกับวินิจฉัย",
      problem: "ไม่มี care plan standard หรือ guideline เลือก intervention",
      solution: ["Database: สร้าง Care Plan Library (Diagnosis → Interventions mapping)", "Tool: ลิงก์วินิจฉัย → แสดง intervention options ใน EMR", "Training: สอนการเลือก intervention ที่เหมาะสม"]
    },
    "P3": { 
      cause: "แผนส่งต่อ/ย้ายตึก ไม่ชัดเจน",
      problem: "ไม่มี SOP การส่งต่อ หรือ checklist อุปกรณ์ที่ต้องเตรียม",
      solution: ["SOP: สร้าง Transfer Protocol (checklist เอกสาร, อุปกรณ์, การส่งต่อข้อมูล)", "Checklist: ติดที่เตียง/ห้องส่งต่อ", "Training: briefing ทีมเรื่อง Safe Handoff Protocol"]
    },
    "I1": { 
      cause: "บันทึกกิจกรรม/ยาไม่ครบตามคำสั่งแพทย์",
      problem: "ไม่มี MAR (Medication Administration Record) ที่เห็นง่าย",
      solution: ["System: ให้ Medication Order link ไป MAR ให้พยาบาลมอง", "Checklist: Each order ต้อง check ✓ บันทึกจึงจะ submit ได้", "Alert: reminder ยังมี pending medication/order"]
    },
    "I2": { 
      cause: "บันทึกหัตถการไม่มี 'เวลา' หรือ 'ผู้ปฏิบัติ'",
      problem: "ช่อง procedure ใน EMR ไม่มี time field หรือ signature field",
      solution: ["System: เพิ่ม mandatory fields: Procedure time + Provider name + Signature", "Template: สร้าง procedure checklist (pre-procedure, procedure, post-procedure)", "Training: ขั้นตอนการบันทึก procedure ให้ครบถ้วน"]
    },
    "I3": { 
      cause: "ไม่มีบันทึก double check ยา/มาตรการ HAD",
      problem: "ไม่มี checklist double check ยา 6Rs หรือ HAD protocol",
      solution: ["Poster: 'Double Check 6Rs' ติดที่ medication counter", "Tool: สร้าง pre-administration checklist ในระบบ", "Training: สอน 6Rs (Right patient, drug, dose, route, time, documentation)"]
    },
    "E1": { 
      cause: "ไม่ประเมินอาการซ้ำ (re-assessment) หลังให้ยา/ทำหัตถการ",
      problem: "ไม่มี template re-assessment หรือ alert reminder",
      solution: ["System: ให้ Medication → Reminder 'Assess ผล 30 นาทีหลังให้ยา'", "Checklist: Pain re-assessment checklist (before-after pain score)", "Training: สอนการประเมิน effectiveness ของการรักษา"]
    },
    "E2": { 
      cause: "สัญญาณชีพสุดท้ายก่อนจำหน่าย ไม่ครบ",
      problem: "ไม่มี alert discharge vital signs หรือ discharge checklist",
      solution: ["System: Mandatory 'Discharge Vital Signs' ก่อน discharge button", "Checklist: Discharge assessment form (Vitals, Status, Teaching done)", "Training: ความสำคัญของ final assessment ก่อนจำหน่าย"]
    },
    "E3": { 
      cause: "ไม่บันทึก เวลา/สถานะ จำหน่าย หรือคำแนะนำ",
      problem: "ช่อง Discharge ไม่มี template หรือ guidance",
      solution: ["Template: Discharge template (time, status, instructions, follow-up)", "Checklist: Discharge checklist (medication, diet, activity, follow-up appt)", "Tool: สร้าง discharg instruction form ที่พิมพ์ให้ผู้ป่วยได้"]
    }
  };

  if (weakItems.length > 0) {
    const analysisDiv = h("div", { className: "cd", style: { background: "#fff9e6", borderLeft: "4px solid #f57f17" } },
      h("div", { style: { fontWeight: "800", fontSize: "12px", color: "#f57f17", marginBottom: "6px" } }, "💡 วิเคราะห์และแนวทางพัฒนา")
    );
    
    weakItems.forEach(w => {
      const info = itemAnalysis[w.id] || { cause: "ไม่ครบถ้วน", problem: "ไม่มี process", solution: ["ต้องปรับปรุง"] };
      const solutionText = Array.isArray(info.solution) ? info.solution.join(" • ") : info.solution;
      
      analysisDiv.appendChild(h("div", { style: { marginBottom: "8px", paddingBottom: "8px", borderBottom: "1px solid #f9a825" } },
        h("div", { style: { fontWeight: "700", fontSize: "11px", color: "#d32f2f", marginBottom: "3px" } }, "❌ " + w.id + " (" + w.pct + "%)"),
        h("div", { style: { fontSize: "9px", color: "#333", marginTop: "2px" } }, "🔴 สาเหตุ: " + info.cause),
        h("div", { style: { fontSize: "9px", color: "#e67e22", marginTop: "1px" } }, "⚠️  ปัญหา: " + info.problem),
        h("div", { style: { fontSize: "9px", color: "#1565c0", marginTop: "2px", fontWeight: "600" } }, "💡 วิธีแก้: " + solutionText)
      ));
    });
    
    app.appendChild(analysisDiv);
  } else {
    app.appendChild(h("div", { className: "cd", style: { background: "#e8f5e9", borderLeft: "4px solid #4CAF50" } },
      h("div", { style: { fontWeight: "800", fontSize: "12px", color: "#2e7d32" } }, "🎉 สรุป: ทั้ง " + recs.length + " ราย ผ่านเกณฑ์ทั้งหมด! ยอดเยี่ยม")
    ));
  }

  app.appendChild(h("div", { style: { display: "flex", gap: "4px", justifyContent: "center", margin: "8px 0" } },
    h("button", { className: "btn btn-p", onClick: () => { S.tab = "form"; ren(); } }, "← กลับบันทึก"),
    h("button", { className: "btn btn-o", onClick: () => window.print() }, "🖨 พิมพ์")
  ));

  setTimeout(() => {
    const ctx = document.getElementById("chartSec");
    if (ctx) {
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: secData.map(d => d.section),
          datasets: [{
            label: "ร้อยละ",
            data: secData.map(d => d.pct),
            backgroundColor: secData.map(d => {
              const key = d.section + "_" + (d.pct >= 90 ? "pass" : "fail");
              return COLORS[key];
            }),
            borderColor: "#0d47a1",
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + "%" } } }
        }
      });
    }
  }, 100);
}

function rS(app) {
  app.appendChild(h("div", { className: "cd" },
    h("div", { style: { fontWeight: "800", fontSize: "12px", color: "var(--bd-dark)", marginBottom: "8px" } }, "🎨 ตั้งค่าสีกราฟ"),
    h("div", { className: "color-grid" },
      ["A", "D", "P", "I", "E"].flatMap(sec => [
        h("div", { className: "color-box" },
          h("label", null, sec + " ผ่าน"),
          h("input", { type: "color", value: COLORS[sec + "_pass"], onChange: e => { COLORS[sec + "_pass"] = e.target.value; svColors(); } })
        ),
        h("div", { className: "color-box" },
          h("label", null, sec + " ต้องปรับ"),
          h("input", { type: "color", value: COLORS[sec + "_fail"], onChange: e => { COLORS[sec + "_fail"] = e.target.value; svColors(); } })
        )
      ])
    ),
    h("div", { style: { display: "flex", gap: "4px", justifyContent: "center" } },
      h("button", { className: "btn btn-o", onClick: () => { COLORS = JSON.parse(JSON.stringify(DEFAULT_COLORS)); svColors(); ren(); } }, "🔄 รีเซ็ต")
    )
  ));
}

ren();
</script>
</body>
</html>
